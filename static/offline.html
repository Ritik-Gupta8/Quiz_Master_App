<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>Offline | Quiz Master</title>
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex flex-col items-center justify-center p-6 text-center">
    
    <div class="bg-white rounded-3xl shadow-xl shadow-indigo-100 p-10 max-w-md w-full border border-indigo-50 transform transition-all">
        <div class="h-24 w-24 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="h-10 w-10 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" opacity="0.3"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18"/>
            </svg>
        </div>
        
        <h2 class="text-2xl font-black text-slate-800 tracking-tight mb-2">You're Offline</h2>
        <p class="text-slate-500 mb-8 font-medium">It looks like you've lost your internet connection. Quiz Master requires an active connection to generate AI quizzes and sync your scores natively.</p>
        
        <button onclick="window.location.reload()" class="w-full inline-flex justify-center items-center px-6 py-3.5 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all group">
            <svg class="w-5 h-5 mr-2 group-hover:-rotate-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Try Reconnecting
        </button>
    </div>
    
</body>
</html>
