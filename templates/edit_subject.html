{%extends "admin_layout.html"%} <!--Inherited all features-->
{%block content%}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
        <div class="px-8 py-6 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
            <div>
                <h3 class="text-xl font-bold text-slate-900">Edit Subject</h3>
                <p class="text-sm text-slate-500">Update the details for <span class="text-indigo-600 font-semibold">{{ subject.name }}</span></p>
            </div>
            <a href="{{ url_for('delete_subject', id=subject.id) }}" onclick="return confirm('Are you sure you want to delete this subject and all its chapters?')" 
               class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Delete Subject">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </a>
        </div>
        <form action="{{ url_for('edit_subject', id=subject.id) }}" method="POST" class="p-8 space-y-6">
            <div class="space-y-2">
                <label for="sname" class="block text-sm font-semibold text-slate-700">Subject Name</label>
                <input type="text" name="sname" id="sname" value="{{ subject.name }}" required 
                       class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">
            </div>
            
            <div class="space-y-2">
                <label for="description" class="block text-sm font-semibold text-slate-700">Description</label>
                <textarea name="description" id="description" required rows="3"
                          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">{{ subject.description }}</textarea>
            </div>
            
            <div class="flex items-center justify-end space-x-4 pt-4">
                <a href="{{ url_for('admin_dashboard') }}" class="px-6 py-3 text-sm font-semibold text-slate-600 hover:text-slate-900 transition-colors">
                    Cancel
                </a>
                <button type="submit" class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
