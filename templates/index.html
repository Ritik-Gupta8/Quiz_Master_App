<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles/main.css">
    <title>Welcome | Quiz Master</title>
    <meta name="description" content="Quiz Master - The ultimate dynamic quiz platform. Challenge yourself across subjects, track progress, and generate AI-powered quizzes.">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] overflow-x-hidden">
    <div class="relative min-h-screen flex items-center justify-center px-4">
        <!-- Abstract background elements -->
        <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-yellow-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-4000"></div>

        <div class="relative max-w-4xl w-full text-center space-y-8">
            <div class="space-y-4">
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight text-slate-900">
                    Master Your <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-teal-500">Knowledge</span>
                </h1>
                <p class="text-lg md:text-xl text-slate-600 max-w-2xl mx-auto leading-relaxed">
                    Welcome to <span class="font-bold text-indigo-600">Quiz Master</span> – The ultimate dynamic platform where learning meets excitement. Challenge yourself across various subjects and climb the leaderboard!
                </p>
            </div>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="/login" class="w-full sm:w-auto px-8 py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all">
                    Get Started
                </a>
                <a href="/register" class="w-full sm:w-auto px-8 py-4 bg-white text-indigo-600 font-bold rounded-2xl border border-indigo-100 shadow-sm hover:bg-indigo-50 hover:-translate-y-1 transition-all">
                    Create Account
                </a>
            </div>

            <!-- Floating Preview Decor -->
            <div class="pt-12 animate-float">
                <div class="inline-block p-6 glass rounded-3xl border border-white/50 shadow-2xl">
                    <div class="flex items-center space-x-4 text-left">
                        <div class="h-12 w-12 bg-teal-100 rounded-2xl flex items-center justify-center text-teal-600">
                             <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9l-.707.707M16.243 4.757l.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-slate-900">AI Powered Generation</p>
                            <p class="text-xs text-slate-500 text-nowrap">Instantly create quizzes for any subject</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
