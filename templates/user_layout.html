<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>User Home | Quiz Master</title>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen">
    <nav class="sticky top-0 z-50 glass border-b border-indigo-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-500">
                            QuizMaster
                        </span>
                    </div>
                    <div class="hidden sm:flex sm:space-x-4">
                        <a href="/user/{{user.id}}/{{name}}" class="px-3 py-2 rounded-md text-sm font-medium text-slate-700 hover:text-indigo-600 hover:bg-slate-100 transition-all">Home</a>
                        <a href="/view_score/{{user.id}}/{{name}}" class="px-3 py-2 rounded-md text-sm font-medium text-slate-700 hover:text-indigo-600 hover:bg-slate-100 transition-all">My Scores</a>
                        <a href="/user_summary/{{user.id}}/{{name}}" class="px-3 py-2 rounded-md text-sm font-medium text-slate-700 hover:text-indigo-600 hover:bg-slate-100 transition-all">Progress</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <form class="hidden md:flex relative group" method="POST" action="/user_search/{{user.id}}/{{name}}">
                        <input type="search" placeholder="Search quizzes..." name="search_txt" id="search_txt" 
                               class="pl-10 pr-4 py-1.5 border border-slate-200 rounded-full text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all w-48 group-focus-within:w-64">
                        <div class="absolute left-3 top-2 text-slate-400">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </div>
                    </form>
                    <div class="flex items-center text-sm font-medium text-slate-600 space-x-4">
                        <span class="hidden lg:inline">Hello, <span class="text-indigo-600 font-semibold">{{name}}</span></span>
                        <a href="/logout" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-indigo-100 mt-auto">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center space-x-2">
                    <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-500">
                        QuizMaster
                    </span>
                    <span class="text-slate-400 text-sm">© 2026 Student Portal</span>
                </div>
                <div class="flex space-x-6 text-sm text-slate-500">
                    <a href="#" class="hover:text-indigo-600 transition-colors">Help Center</a>
                    <a href="#" class="hover:text-indigo-600 transition-colors">Privacy</a>
                    <a href="#" class="hover:text-indigo-600 transition-colors">Terms</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
