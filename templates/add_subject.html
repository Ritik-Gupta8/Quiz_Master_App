{% extends "admin_layout.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
        <div class="px-8 py-6 bg-slate-50 border-b border-slate-100">
            <h3 class="text-xl font-bold text-slate-900">Create New Subject</h3>
            <p class="text-sm text-slate-500">Group your chapters under a broader subject category.</p>
        </div>
        <form action="/subject/{{ name }}" method="POST" class="p-8 space-y-6">
            <div class="space-y-2">
                <label for="name" class="block text-sm font-semibold text-slate-700">Subject Name</label>
                <input type="text" name="name" id="name" required placeholder="e.g. Mathematics, History, Physics"
                       class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">
            </div>
            
            <div class="space-y-2">
                <label for="description" class="block text-sm font-semibold text-slate-700">Description</label>
                <textarea name="description" id="description" required rows="3" placeholder="Briefly describe what this subject covers..."
                          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none"></textarea>
            </div>
            
            <div class="flex items-center justify-end space-x-4 pt-4">
                <a href="/admin/{{ name }}" class="px-6 py-3 text-sm font-semibold text-slate-600 hover:text-slate-900 transition-colors">
                    Cancel
                </a>
                <button type="submit" class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
                    Save Subject
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
