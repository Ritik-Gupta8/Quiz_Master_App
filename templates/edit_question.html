{% extends "admin_layout.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
        <div class="px-8 py-6 bg-slate-50 border-b border-slate-100">
            <h3 class="text-xl font-bold text-slate-900">Edit Question</h3>
            <p class="text-sm text-slate-500">Modify the content or options for this question.</p>
        </div>
        <form action="/edit_question/{{ question.id }}/{{ name }}" method="POST" class="p-8 space-y-6">
            <div class="space-y-4">
                <div class="space-y-2">
                    <label for="question_statement" class="block text-sm font-semibold text-slate-700">Question Statement</label>
                    <textarea name="question_statement" id="question_statement" required rows="3"
                              class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">{{ question.question_statement }}</textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label for="question_type" class="block text-sm font-semibold text-slate-700">Question Type</label>
                        <input type="text" name="question_type" id="question_type" value="{{ question.question_type }}" required
                               class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">
                    </div>
                    <div class="space-y-2">
                        <label for="correct_option" class="block text-sm font-semibold text-slate-700">Correct Option</label>
                        <select name="correct_option" id="correct_option" required
                                class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none bg-white font-semibold text-indigo-600">
                            <option value="option1" {% if question.correct_option == "option1" %}selected{% endif %}>Option 1</option>
                            <option value="option2" {% if question.correct_option == "option2" %}selected{% endif %}>Option 2</option>
                            <option value="option3" {% if question.correct_option == "option3" %}selected{% endif %}>Option 3</option>
                            <option value="option4" {% if question.correct_option == "option4" %}selected{% endif %}>Option 4</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Option 1</label>
                        <input type="text" name="option1" id="option1" value="{{ question.option1 }}" required
                               class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Option 2</label>
                        <input type="text" name="option2" id="option2" value="{{ question.option2 }}" required
                               class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Option 3</label>
                        <input type="text" name="option3" id="option3" value="{{ question.option3 }}" required
                               class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Option 4</label>
                        <input type="text" name="option4" id="option4" value="{{ question.option4 }}" required
                               class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all outline-none">
                    </div>
                </div>
            </div>
            
            <div class="flex items-center justify-end space-x-4 pt-4">
                <a href="/quiz_management/{{ name }}" class="px-6 py-3 text-sm font-semibold text-slate-600 hover:text-slate-900 transition-colors">
                    Cancel
                </a>
                <button type="submit" class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
                    Update Question
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
