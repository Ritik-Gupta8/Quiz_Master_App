{% extends "user_layout.html" %}
{% block content %}
<div class="space-y-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Your Progress</h2>
            <p class="text-slate-500 mt-1">A visual summary of your learning journey.</p>
        </div>
        <div class="h-12 w-12 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="px-8 py-6 bg-slate-50 border-b border-slate-100">
            <h3 class="text-lg font-bold text-slate-700">Performance Overview</h3>
            <p class="text-sm text-slate-500">Visual breakdown of your quiz attempts and scores.</p>
        </div>
        <div class="p-8 flex justify-center">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-emerald-500 to-teal-500 rounded-2xl blur opacity-10 group-hover:opacity-20 transition duration-1000"></div>
                <img src="{{ url_for('static', filename='images/user_summary.jpeg') }}" 
                     class="relative rounded-xl shadow-lg border border-slate-100 max-w-full h-auto" 
                     alt="User Summary Chart">
            </div>
        </div>
    </div>
</div>
{% endblock %}
